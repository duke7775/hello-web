<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8">
        <title>My Form</title>
    </head>
    <body>
        <form>
            <fieldset>
                <legend>General Info</legend>
                <div>
                    <label for="itemName">Item Name</label>
                    <input type="text" id="itemName" name="itemName">
                </div>
                <br>
                <div>
                    <label for="itemDescription">Description</label>
                    <textarea id="itemDescription" name="itemDescription"></textarea>
                </div>
                <br>
                <div>
                    <label for="category">Category</label>
                    <select id="category" name="category">
                        <option value="">Not Specified</option>
                        <option value="consumption">Consumption</option>
                        <option value="household">Household</option>
                        <option value="electronics">Electronics</option>
                        <option value="gadgets">Gadgets</option>
                    </select>
                </div>
            </fieldset>

            <fieldset>
                <legend>Misc.</legend>
                <div>
                    <label for="inventoryAmount">Inventory Amount</label>
                    <input type="number" id="inventoryAmount" name="inventoryAmount" placeholder="Inventory Amount">
                </div>
                <br>
                <div>
                    <label for="listPrice">List Price</label>
                    <input type="number" step="0.01" id="listPrice" name="listPrice" placeholder="List Price">
                </div>
                <br>
                <div>
                    <p>Available stores</p>
                    <div style="display: flex; gap: 1rem; flex-wrap: wrap; align-items: center;">
                        <label>
                            <input type="checkbox" name="stores" value="Bangkok"> Bangkok
                        </label>
                        <label>
                            <input type="checkbox" name="stores" value="Pattaya"> Pattaya
                        </label>
                        <label>
                            <input type="checkbox" name="stores" value="Phuket"> Phuket
                        </label>
                    </div>
                </div>
            </fieldset>

            <div style="text-align: right; margin-top: 1rem;">
                <button type="submit" style="background-color: #007bff; color: #ffffff; border: none; padding: 0.75rem 1.25rem; border-radius: 0.25rem; cursor: pointer;">Submit</button>
            </div>
            <div id="submitResult" style="margin-top: 1rem; padding: 1rem; background: #f8f9ff; border: 1px solid #dfe4ff; border-radius: 0.4rem; font-family: Consolas, Monaco, monospace; white-space: pre; display: none;"></div>
        </form>
        <script>
            document.querySelector('form').onsubmit = function(event) {
                event.preventDefault();
                const response = {
                    success: true,
                    insertedId: Math.random().toString(16).slice(2, 18)
                };
                const resultBox = document.getElementById('submitResult');
                resultBox.style.display = 'block';
                resultBox.textContent = JSON.stringify(response, null, 4);
            };
        </script>
    </body>
</html>
