  <body class="bg-light">
    <div class="container mt-5">
      <div class="card shadow">
        <div class="card-body">
          <h3 class="mb-4">Interactive Web Form</h3>
          <!-- Username -->
          <div class="mb-3">
            <label class="form-label">Username</label>
            <input type="text" id="username" class="form-control" />
          </div>
          <!-- Email -->
          <div class="mb-3">
            <label class="form-label">Email</label>
            <input type="email" id="email" class="form-control" />
          </div>
          <!-- Password -->
          <div class="mb-3">
            <label class="form-label">Password</label>
            <input type="password" id="password" class="form-control" />
          </div>
          <!-- Confirm Password -->
          <div class="mb-3">
            <label class="form-label">Confirm Password</label>
            <input type="password" id="confirmPassword" class="form-control" />
          </div>
          <!-- Interesting Topics -->
          <div class="mb-3">
            <label class="form-label fw-bold">Interesting Topics</label>
            <div class="form-check">
              <input
                class="form-check-input topic"
                type="checkbox"
                id="topic1"
                value="HTML"
              />
              <label class="form-check-label" for="topic1">HTML</label>
            </div>
            <div class="form-check">
              <input
                class="form-check-input topic"
                type="checkbox"
                id="topic2"
                value="CSS"
              />
              <label class="form-check-label" for="topic2">CSS</label>
            </div>
            <div class="form-check">
              <input
                class="form-check-input topic"
                type="checkbox"
                id="topic3"
                value="JavaScript"
              />
              <label class="form-check-label" for="topic3">JavaScript</label>
            </div>
          </div>
          <!-- Gender -->
          <div class="mb-3">
            <label class="form-label fw-bold">Gender</label>
            <select id="gender" class="form-select">
              <option>--</option>
              <option>Male</option>
              <option>Female</option>
              <option>Other</option>
            </select>
          </div>
          <!-- Submit -->
          <button id="submitBtn" class="btn btn-primary">Submit</button>
        </div>
      </div>
    </div>
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>

    <script>
  $("#submitBtn").click(function () {

    $(".error-text").remove();
    $(".form-control").css("border-color", "");

  
    $("#username, #email, #password, #confirmPassword").each(function () {

      if ($(this).val().trim() === "") {

      
        $(this).css("border-color", "red");


        $(this).after(
          '<div class="error-text">this field must not be empty</div>'
        );

      }

    });
    if ($(".topic:checked").length == 0){
      $(".topic").last().parent().after('<div class= "error-text">Please select at least one topic</div>');

    }
    if($("#gender").val() == "--"){
      $("#gender").css("border-color", "red");
      $("#gender").after('<div class="error-text">Please select a gender</div>');
    }
    if($("#password").val() !== $("#confirmPassword").val()){
      $("#password").css("border-color", "red");
      $("#confirmPassword").css("border-color", "red");
      $("#confirmPassword").after('<div class="error-text">confirmed password mismatched the password</div>');
    }

  });
</script>
