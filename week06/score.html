  <body>
    <div>
      <table>
        <thead>
          <tr>
            <th style="width: 5%">ID</th>
            <th style="width: 30%">Name</th>
            <th>Midterm</th>
            <th>Final</th>
            <th>Total</th>
            <th>Grade</th>
          </tr>
        </thead>
        <tbody id="table-body"></tbody>
      </table>
    </div>
    <script>
      $(document).ready(function () {
        students.forEach(function (student) {
    let total = student.midterm + student.final;

    let grade;

    if (total >= 80) {
      grade = "A";
    } else if (total >= 75) {
      grade = "B+";
    } else if (total >= 70) {
      grade = "B";
    } else if (total >= 65) {
      grade = "C+";
    } else if (total >= 60) {
      grade = "C";
    } else if (total >= 55) {
      grade = "D+";
    } else if (total >= 50) {
      grade = "D";
    } else {
      grade = "F";
    }

    $("#table-body").append(`
      <tr>
        <td>${student.id}</td>
        <td>${student.name}</td>
        <td>${student.midterm}</td>
        <td>${student.final}</td>
        <td>${total}</td>
        <td>${grade}</td>
      </tr>
    `);
  });
});
    </script>
